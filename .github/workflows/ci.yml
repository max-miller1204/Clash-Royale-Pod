name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Ruff / mypy / pytest (nix develop)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Sync dependencies
        run: nix develop --command uv sync --frozen

      - name: Ruff lint
        run: nix develop --command uv run ruff check .

      - name: Ruff format check
        run: nix develop --command uv run ruff format --check .

      - name: mypy
        run: nix develop --command uv run mypy src

      - name: pytest
        run: nix develop --command uv run pytest
